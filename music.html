  <script>
    async function fetchAlbumArt(card, id, type) {
      const url = `https://open.spotify.com/oembed?url=spotify:${type}:${id}`;
      try {
        const response = await fetch(url);
        const data = await response.json();
        const img = document.createElement('img');
        img.src = data.thumbnail_url;
        img.alt = data.title;
        card.insertBefore(img, card.firstChild);
        const span = card.querySelector('.spotify-card-overlay span');
        span.textContent = data.title;
        card.classList.add('loaded');
      } catch (e) {
        card.querySelector('.spotify-card-overlay span').textContent = 'Error loading';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.spotify-card').forEach(card => {
        const id = card.dataset.id;
        const type = card.closest('[data-type]')?.dataset.type || 'album';
        fetchAlbumArt(card, id, type);
      });
    });
  </script>
